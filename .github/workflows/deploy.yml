name: GitHub Pages デプロイ

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Hugo セットアップ
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: ビルド
        run: hugo --minify

      - name: Pages アップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: デプロイ
        id: deployment
        uses: actions/deploy-pages@v4